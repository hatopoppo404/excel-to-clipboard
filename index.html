<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>excel to clipboard</title>
    <meta content="Excelファイルから台帳転記用に加工して、クリップボードにコピーします" name="description">
    <meta property="og:title" content="Excel to Clipboard" />
    <meta property="og:description" content="Excelファイルから台帳転記用に加工して、クリップボードにコピーします" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hatopoppo404.github.io/excel-to-clipboard/" />
    <meta property="og:image" content="https://hatopoppo404.github.io/excel-to-clipboard/thumbnail.png" />
    <meta property="og:site_name" content="Excel to Clipboard" />
    <meta property="og:locale" content="ja_JP" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <h1 id="page-title">Excel to Clipboard</h1>
        <p id="page-description">Excelファイルから台帳転記用に加工して、クリップボードにコピーします</p>
    </header>
    <main id="container">
        <div id="mode-selector">
            <label>
                <input type="radio" name="mode" value="poWhMove" class="visually-hidden" checked>
                指図移動
            </label>

            <label>
                <input type="radio" name="mode" value="cancelMo" class="visually-hidden">
                注文取消し
            </label>
        </div>
        <div id="specification">
            <p></p>
        </div>
        <div id="drop-zone">
            Excelをドロップで変換
        </div>
        <div id="btn-area">
            <button id="btn" class="btn">クリップボードから変換</button>
        </div>
    </main>

    <footer>
        <small>&copy; 2025 Excel to Clipboard</small>
    </footer>

    <div id="customAlert" class="modal-overlay">
        <div class="modal-content">
            <h2 id="alertTitle">確認</h2>
            <p id="alertMessage">メッセージ</p>
            <button id="alertClose">OK</button>
        </div>
    </div>
</body>

</html>
